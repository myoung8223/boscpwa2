<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#222222">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OpenSCAD">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic OpenSCAD PWA</title>
    
    <!--script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script-->

    <script src="libs/three.min.js"></script>
    <script src="libs/STLLoader.js"></script>
    <script src="libs/OrbitControls.js"></script>
    
<style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #222; color: #fff; overflow: hidden; }
        
        /* Two-column layout */
        .app-container { display: flex; height: 100vh; width: 100vw; }
        .left-panel { width: 50%; display: flex; flex-direction: column; border-right: 2px solid #444; }

        .right-panel { 
            width: 50%; 
            height: 100vh; /* THE FIX: Lock panel height to 100% of the viewport vertical height */
            display: flex; 
            flex-direction: column; 
            background: #222; 
            position: relative; 
            overflow: hidden; /* Stops accidental scrollbar leaks */
        }
        
        /* Toolbar */
        .toolbar { padding: 10px; background: #111; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        button { background: #007acc; color: white; border: none; padding: 8px 14px; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 0.9rem; }
        button:hover { background: #0062a3; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .file-btn { background: #444; }
        .file-btn:hover { background: #555; }
        
        /* Code Editor Textarea */
        textarea { 
            flex-grow: 1; 
            background: #1e1e1e; 
            color: #d4d4d4; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 14px; 
            padding: 15px; 
            border: none; 
            resize: none; 
            outline: none; 
            line-height: 1.5; 
            
            /* --- ADD THESE TWO LINES HERE --- */
            tab-size: 4;
            -moz-tab-size: 4; /* Compatibility for older Firefox versions */
        }
        
        /* Console Output Box */
        .console-box { height: 150px; background: #000; border-top: 2px solid #444; font-family: monospace; font-size: 13px; color: #0f0; padding: 10px; overflow-y: auto; white-space: pre-wrap; }
        
        /* 2. TARGET VIEWPORT PANEL FRAMING */
        #viewer-3d { 
            position: absolute;
            top: 0;
            bottom: 0; /* Anchor tightly to the bottom boundary edge */
            left: 0;
            right: 0;  /* Anchor tightly to the right boundary edge */
            width: 100%; 
            height: 100%; 
            display: block;
            background-color: #222222; 
            z-index: 1;
        }
        /* THE FIX: Force the inner WebGL canvas to actively match the container dimensions */
        #viewer-3d canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        
        .viewer-placeholder { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: #888; 
            text-align: center; 
            pointer-events: none; 
            z-index: 10; /* Keeps it layered neatly on top */
        }

        /* ==========================================================================
           🛠️ NEW: SETTINGS OVERLAY LAYOUTS
           ========================================================================== */
        
        /* The fullscreen dimmed background blur */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px); /* Premium UI glass effect */
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000; /* Floating strictly on top of textareas/WebGL canvases */
            transition: opacity 0.15s ease;
        }

        /* The modular settings card interface container */
        .overlay-content {
            background-color: #1e1e1e; /* Matches your editor background color palette */
            border: 1px solid #333;
            color: #ffffff;
            padding: 24px;
            border-radius: 6px;
            width: 320px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        /* Utility visibility controller */
        .hidden {
            display: none !important;
        }

        /* Native-feeling floating 'X' shutdown button alignment */
        .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: #888;
            font-size: 22px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        .close-btn:hover { color: #fff; }

        /* Row organizer for individual options panels */
        .settings-group {
            margin: 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="left-panel">
            <div class="toolbar">
                <input type="file" id="file-load" style="display:none;" accept=".scad">
                <button class="file-btn" onclick="document.getElementById('file-load').click()">Load</button>
                <button class="file-btn" id="btn-save">Save</button>
                
                <button id="btn-settings" class="file-btn">⚙️ Settings</button>

                <input type="color" id="model-color" value="#3b82f6" style="display: none;">
                
                <button id="btn-preview" style="margin-left: auto; background: #ffc107; color: #000;">Preview</button>
                <button id="btn-export" style="background: #28a745;">Export STL</button>
            </div>
            
            <textarea id="editor" spellcheck="false">// Welcome to boscpwa
$fn = 40;
union() {
    cube([15, 15, 15], center = true);
    sphere(r = 10);
}</textarea>
            
            <div class="console-box" id="console">Basic OpenSCAD PWA - By: Mike Young</div>
        </div>

        <div class="right-panel">
            <div class="viewer-placeholder" id="placeholder-text">
                3D Preview Window<br>
                <span style="font-size:0.9rem; color:#666;">Click 'Preview' to view geometry</span>
            </div>
            
            <div id="viewer-3d"></div>
        </div>
    </div>

    <div id="settings-overlay" class="overlay hidden">
        <div class="overlay-content">
            <button id="btn-close-settings" class="close-btn">&times;</button>
            <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 1.2rem;">Workspace Settings</h3>
            <hr style="border: 0; border-top: 1px solid #333; margin-bottom: 20px;">

            <div class="settings-group" style="flex-direction: column; align-items: flex-start; gap: 6px;">
                <label style="font-size: 0.9rem; color: #aaa;">Project Name:</label>
                <input type="text" id="project-name-input" placeholder="untitled" 
                    style="width: 100%; background: #2d2d2d; border: 1px solid #444; color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 0.9rem; outline: none;">
            </div>
            
            <div class="settings-group">
                <label style="font-size: 0.9rem; color: #aaa;">Model View:</label>
                <button id="btn-wireframe" class="file-btn" style="width: 120px;">Solid</button>
            </div>
            
            <div class="settings-group">
                <label style="font-size: 0.9rem; color: #aaa;">Model Color:</label>
                <button id="btn-color-trigger" class="file-btn" style="width: 120px; color: #ffffff; text-shadow: 0px 1px 2px rgba(0,0,0,0.6);">Color</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
