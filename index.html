<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boscpwa - OpenSCAD PWA</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #222; color: #fff; overflow: hidden; }
        
        /* Two-column layout */
        .app-container { display: flex; height: 100vh; width: 100vw; }
        .left-panel { width: 50%; display: flex; flex-direction: column; border-right: 2px solid #444; }
        .right-panel { width: 50%; display: flex; flex-direction: column; background: #333; position: relative; }
        
        /* Toolbar */
        .toolbar { padding: 10px; background: #111; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        button { background: #007acc; color: white; border: none; padding: 8px 14px; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 0.9rem; }
        button:hover { background: #0062a3; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .file-btn { background: #444; }
        .file-btn:hover { background: #555; }
        
        /* Code Editor Textarea */
        textarea { flex-grow: 1; background: #1e1e1e; color: #d4d4d4; font-family: 'Courier New', Courier, monospace; font-size: 16px; padding: 15px; border: none; resize: none; outline: none; line-height: 1.5; }
        
        /* Console Output Box */
        .console-box { height: 150px; background: #000; border-top: 2px solid #444; font-family: monospace; font-size: 13px; color: #0f0; padding: 10px; overflow-y: auto; white-space: pre-wrap; }
        
        /* 3D Viewport styling */
        model-viewer { width: 100%; height: 100%; background-color: #333; --poster-color: transparent; }
        .viewer-placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #888; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="left-panel">
            <div class="toolbar">
                <input type="file" id="file-load" style="display:none;" accept=".scad">
                <button class="file-btn" onclick="document.getElementById('file-load').click()">Load .scad</button>
                <button class="file-btn" id="btn-save">Save .scad</button>
                
                <button id="btn-preview" style="margin-left: auto; background: #ffc107; color: #000;">Preview (F5)</button>
                <button id="btn-export" style="background: #28a745;">Export STL</button>
            </div>
            
            <textarea id="editor" spellcheck="false">// Welcome to boscpwa
union() {
    cube([15, 15, 15], center = true);
    sphere(r = 10);
}</textarea>
            
            <div class="console-box" id="console">System ready. Instantiating WASM...</div>
        </div>

        <div class="right-panel">
            <div class="viewer-placeholder" id="placeholder-text">
                3D Preview Window<br>
                <span style="font-size:0.9rem; color:#666;">Click 'Preview' to view geometry</span>
            </div>
            
            <model-viewer id="3d-viewer" camera-controls auto-rotate shadow-intensity="1"></model-viewer>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
